<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Heart Ascend - Login</title>
    <link rel="stylesheet" href="css/login.css">
    <link rel="stylesheet" href="css/fonts.css">
    <link rel="stylesheet" href="css/audio-controls.css">
</head>
<body>
    <div class="background-wrapper stars-bg">
        <div class="login-card welcome-card">
            <div class="logo-container">
                <img src="assets/images/heart icon.png" alt="Heart Icon" class="heart-icon">
            </div>

            <h1 class="title">HEART ASCEND</h1>
            <p class="subtitle">Master the rhythm. Conquer the heart</p>

            <form id="loginForm">
                <div class="input-group">
                    <label>Email</label>
                    <input type="email" id="email" placeholder="Enter your email" required>
                </div>

                <div class="input-group">
                    <label>Password</label>
                    <input type="password" id="password" placeholder="Enter your password" required>
                </div>

                <button type="submit" class="login-btn">Login</button>
            </form>

            <p class="footer-text">New player? Click <a href="signup.html">Sign Up</a> to create your account!</p>
        </div>
    </div>
<script type="module" src="scripts/login.js"></script>
</body>
</html>
