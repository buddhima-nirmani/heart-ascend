<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Heart Ascend - Sign Up</title>
    <link rel="stylesheet" href="css/signup.css">
    <link rel="stylesheet" href="css/fonts.css">
    <link rel="stylesheet" href="css/audio-controls.css">
</head>
<body>
    <div class="background-wrapper stars-bg">
        <div class="signup-card welcome-card">
            <div class="logo-container">
                <img src="assets/images/heart icon.png" alt="Heart Icon" class="heart-icon">
            </div>

            <h1 class="title">HEART ASCEND</h1>
            <p class="subtitle">Master the rhythm. Conquer the heart</p>

            <form id="signupForm">
                <div class="input-group">
                    <label>Nickname</label>
                    <input type="text" id="nickname" placeholder="Enter your cool nickname" required>
                </div>

                <div class="input-group">
                    <label>Email</label>
                    <input type="email" id="email" placeholder="Enter your email" required>
                </div>

                <div class="input-group">
                    <label>Password</label>
                    <input type="password" id="password" placeholder="Enter your password" required>
                </div>

                <div class="input-group">
                    <label>Confirm Password</label>
                    <input type="password" id="confirmPassword" placeholder="Confirm your password" required>
                </div>

                <button type="submit" class="signup-btn">Sign Up</button>
            </form>

            <p class="footer-text">Already have an account? <a href="login.html">Login Here!</a></p>
        </div>
    </div>

    <script type="module" src="scripts/signup.js"></script>
</body>
</html>
